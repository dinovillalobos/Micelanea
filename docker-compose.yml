version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: micelanea_db
    environment:
      POSTGRES_USER: micelanea
      POSTGRES_PASSWORD: micelanea123
      POSTGRES_DB: micelanea
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    # --- Límites para Postgres ---
    deploy:
      resources:
        limits:
          cpus: "0.50" # Máximo el 50% de un núcleo
          memory: 512M # Máximo 512 MB de RAM
        reservations:
          memory: 128M # Mínimo garantizado

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: micelanea_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@micelanea.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: always
    # --- Límites para pgAdmin (consume menos) ---
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres_data:
  pgadmin_data:
